name: Samsara telemetry polling

# Pulls vehicle telemetry (engine state, fuel %, odometer, GPS) from Samsara
# every 10 minutes and inserts rows into vehicle_telemetry_readings.
#
# Why polling not webhooks: Samsara's webhook offering covers driver/address/
# alert events but NOT vehicle stats. Stats are polling-only via
# /fleet/vehicles/stats. We collect now (vs. defer) so historical telemetry
# is ready when the fuel/water-burn model is built. See ADR 011 + 2026-04-30
# design discussion.

on:
  schedule:
    # Every 10 minutes. Repo is public → GitHub Actions free unlimited.
    # 10 min granularity is fine for fuel/engine modeling; sub-minute GPS
    # would need /fleet/vehicles/locations/history (heavier, deferred).
    - cron: '*/10 * * * *'
  workflow_dispatch:  # allow manual trigger

concurrency:
  # Only one run at a time. Queued duplicates get dropped.
  group: samsara-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Pull Samsara telemetry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SAMSARA_API_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
        run: node scripts/sync/cron_samsara_telemetry.js
