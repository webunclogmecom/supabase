name: Jobber polling sync

# Pulls Jobber deltas every 2 minutes and replays them through webhook-jobber.
# This is the polling fallback for Jobber webhook delivery (per ADR 009).
# Once Jobber support resolves webhook delivery, the cron can be deleted —
# the Edge Function path it feeds is the same one webhooks use.

on:
  schedule:
    # Every 5 minutes — keeps us within GitHub Actions free tier (2,000 min/mo)
    # for the private repo. Real-world cadence with cron jitter is closer to
    # 5-15 min, which is operationally indistinguishable from instant for an
    # ops business.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # allow manual trigger

concurrency:
  # Don't pile up overlapping runs — if a previous one is still going,
  # cancel queued duplicates. Active run keeps going.
  group: jobber-poll
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run Jobber poll
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          JOBBER_CLIENT_ID: ${{ secrets.JOBBER_CLIENT_ID }}
          JOBBER_CLIENT_SECRET: ${{ secrets.JOBBER_CLIENT_SECRET }}
        run: node scripts/sync/cron_jobber.js
